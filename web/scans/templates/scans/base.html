<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ThreatScout{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --red: #dc2626;
      --yellow: #d97706;
      --green: #16a34a;
      --gray: #6b7280;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Nav */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    nav .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }
    nav .brand span { color: var(--accent); }
    nav .links { display: flex; gap: 1.5rem; }
    nav .links a { color: var(--text-dim); font-size: 0.9rem; }
    nav .links a:hover { color: var(--text); text-decoration: none; }

    .container { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Forms */
    .scan-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .scan-form input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .scan-form input[type="text"]:focus { border-color: var(--accent); }
    .scan-form input[type="text"]::placeholder { color: var(--text-dim); }

    .btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--accent-hover); }

    /* Verdict banner */
    .verdict-banner {
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .verdict-banner .indicator {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .verdict-banner .meta {
      color: var(--text-dim);
      font-size: 0.85rem;
    }
    .verdict-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* Finding cards */
    .section-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin: 1.5rem 0 0.75rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      border-left: 4px solid var(--gray);
    }
    .card.malicious  { border-left-color: var(--red); }
    .card.suspicious { border-left-color: var(--yellow); }
    .card.clean      { border-left-color: var(--green); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }
    .card-source { font-weight: 700; font-size: 1rem; }
    .card-risk {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
    }

    .card-body dl {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 0.2rem 1rem;
      font-size: 0.88rem;
    }
    .card-body dt { color: var(--text-dim); }
    .card-body dd { word-break: break-word; }
    .card-error { color: var(--red); font-size: 0.88rem; }

    .tag {
      display: inline-block;
      background: var(--surface2);
      padding: 0.1rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      margin: 0.1rem 0.15rem;
    }

    /* History table */
    .search-bar {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .search-bar input, .search-bar select {
      padding: 0.6rem 0.9rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
    }
    .search-bar select { cursor: pointer; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th {
      text-align: left;
      padding: 0.6rem 0.75rem;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--surface2);
    }
    tr:hover td { background: var(--surface); }

    .verdict-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
    }

    .pagination {
      display: flex;
      gap: 0.5rem;
      margin-top: 1.5rem;
      justify-content: center;
    }
    .pagination a, .pagination span {
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.85rem;
    }
    .pagination .current {
      background: var(--accent);
      color: #fff;
    }

    /* Recent scans on index */
    .recent-list { list-style: none; }
    .recent-list li {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--surface2);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
    }
    .recent-list .time { color: var(--text-dim); font-size: 0.8rem; min-width: 130px; }

    h1 { font-size: 1.5rem; margin-bottom: 1rem; }

    .empty { color: var(--text-dim); text-align: center; padding: 3rem 0; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'index' %}" class="brand">Threat<span>Scout</span></a>
    <div class="links">
      <a href="{% url 'index' %}">Scan</a>
      <a href="{% url 'history' %}">History</a>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
